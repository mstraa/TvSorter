<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TvSorter</title>
  <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
  <script src="{{ url_for('static', path='app.js') }}" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/browse">TvSorter</a>
    <nav>
      <a href="/browse">Browse</a>
      <a href="/library">Library</a>
      <a href="/history">History</a>
      <a href="/settings">Settings</a>
    </nav>
    <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <div class="progress-overlay" data-progress-overlay hidden>
    <div class="progress-panel" role="status" aria-live="polite">
      <div class="progress-label" data-progress-label>Working...</div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-bar"></div>
      </div>
    </div>
  </div>
</body>
</html>
