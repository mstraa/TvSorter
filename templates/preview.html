{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Preview</h1>
  <table>
    <thead><tr><th>Source</th><th>Destination</th><th>Status</th></tr></thead>
    <tbody>
    {% for result in results %}
      <tr>
        <td class="path-cell">{{ result.request.source_path }}</td>
        <td class="path-cell">{{ result.final_path }}</td>
        <td>{{ result.result }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
  <a class="button" href="/browse">Back to Browse</a>
</section>
{% endblock %}
